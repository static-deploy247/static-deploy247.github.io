<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">2026 대덕에서 일주일 살기</title>
  <desc id="desc">신청 전에 챙길 핵심</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b3d"/>
      <stop offset="100%" stop-color="#1f4c7a"/>
    </linearGradient>
  </defs>
  <style>
    .title { font: 800 84px 'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif; fill:#fff; letter-spacing:-0.02em; }
    .sub { font: 500 34px 'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif; fill:rgba(255,255,255,0.92); }
  </style>
  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <text x="88" y="250" class="title">2026</text>
  <text x="88" y="365" class="title">대덕에서</text>
  <text x="88" y="480" class="title">일주일 살기</text>
  <text x="88" y="570" class="sub">신청 전에 챙길 핵심</text>
</svg>
