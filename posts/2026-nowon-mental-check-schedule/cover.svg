<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">노원구 심리상담 검사 일정</title>
  <desc id="desc">청년 프로그램 모집 안내</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b3d"/>
      <stop offset="100%" stop-color="#1f4c7a"/>
    </linearGradient>
  </defs>
  <style>
    .title { font: 800 86px 'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif; fill:#fff; letter-spacing:-0.02em; }
    .sub { font: 500 36px 'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif; fill:rgba(255,255,255,0.92); }
  </style>
  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <text x="88" y="280" class="title">노원구 심리상담</text>
  <text x="88" y="400" class="title">검사 일정</text>
  <text x="88" y="520" class="sub">청년 프로그램 모집 안내</text>
</svg>
