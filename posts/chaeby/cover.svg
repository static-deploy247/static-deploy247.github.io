<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">채비(구.대영채비) 공모주 청약 분석</title>
  <desc id="desc">청약일 : 2026-04-20 ~ 2026-04-21</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1b2845"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .title { font: 800 78px 'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif; fill: #ffffff; letter-spacing: -0.02em; }
    .subtitle { font: 500 32px 'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif; fill: rgba(255,255,255,0.8); }
    .chip { font: 700 20px 'Pretendard',sans-serif; fill: #4facfe; }
  </style>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Diagonal grid -->
  <line x1="602" y1="0" x2="1280" y2="482" stroke="rgba(79,172,254,0.05)" stroke-width="1"/>
  <line x1="704" y1="0" x2="1280" y2="410" stroke="rgba(79,172,254,0.05)" stroke-width="1"/>
  <line x1="806" y1="0" x2="1280" y2="338" stroke="rgba(79,172,254,0.05)" stroke-width="1"/>
  <line x1="896" y1="0" x2="1280" y2="274" stroke="rgba(79,172,254,0.06)" stroke-width="1"/>
  <!-- Candlestick chart -->
  <g opacity="0.5">
    <line x1="883" y1="338" x2="883" y2="518" stroke="#ff6b6b" stroke-width="2"/>
    <rect x="871" y="382" width="24" height="79" rx="2" fill="#ff6b6b"/>
    <line x1="934" y1="302" x2="934" y2="497" stroke="#51cf66" stroke-width="2"/>
    <rect x="922" y="317" width="24" height="101" rx="2" fill="#51cf66"/>
    <line x1="998" y1="259" x2="998" y2="454" stroke="#51cf66" stroke-width="2"/>
    <rect x="986" y="281" width="24" height="94" rx="2" fill="#51cf66"/>
    <line x1="1062" y1="252" x2="1062" y2="432" stroke="#ff6b6b" stroke-width="2"/>
    <rect x="1050" y="288" width="24" height="72" rx="2" fill="#ff6b6b"/>
    <line x1="1126" y1="180" x2="1126" y2="403" stroke="#51cf66" stroke-width="2"/>
    <rect x="1114" y="202" width="24" height="122" rx="2" fill="#51cf66"/>
    <line x1="1178" y1="151" x2="1178" y2="353" stroke="#51cf66" stroke-width="2"/>
    <rect x="1166" y="173" width="24" height="101" rx="2" fill="#51cf66"/>
  </g>
  <!-- Glow effect -->
  <ellipse cx="1050" cy="353" rx="294" ry="252" fill="url(#glow)"/>
  <!-- Tag -->
  <rect x="80" y="173" width="100" height="36" rx="18" fill="rgba(79,172,254,0.12)" stroke="rgba(79,172,254,0.3)" stroke-width="1"/>
  <text x="130" y="197" text-anchor="middle" class="chip">공모주</text>
  <!-- Title: company name -->
  <text x="80" y="317" class="title">채비(구.대영채비)</text>
  <!-- Fixed line -->
  <text x="80" y="411" class="title">공모주 청약 분석</text>
  <!-- Subtitle -->
  <text x="80" y="481" class="subtitle">청약일 : 2026-04-20 ~ 2026-04-21</text>
  <!-- Bottom accent -->
  <rect x="80" y="612" width="160" height="3" rx="1.5" fill="#4facfe" opacity="0.4"/>
</svg>
